name: build

on:
  push:
  pull_request:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            script: ./scripts/package-linux.sh
            artifact: gmsv_rhttp_linux64.dll
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            script: ./scripts/package-windows.ps1
            artifact: gmsv_rhttp_win64.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - name: Build package
        shell: bash
        if: runner.os == 'Linux'
        run: ${{ matrix.script }}
      - name: Build package
        shell: pwsh
        if: runner.os == 'Windows'
        run: ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
